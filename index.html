<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Photography | Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage-green: #6b8266; /* Matching your logo background */
            --off-white: #f8f9f7;
            --dark-text: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', serif;
            background-color: var(--sage-green);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }

        .tagline {
            font-style: italic;
            font-size: 1.2rem;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .container {
            background: white;
            color: var(--dark-text);
            width: 90%;
            max-width: 800px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 50px;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .booking-btn {
            display: inline-block;
            background-color: var(--sage-green);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: transform 0.3s ease, background 0.3s ease;
            margin-top: 20px;
            border: none;
            cursor: pointer;
        }

        .booking-btn:hover {
            transform: translateY(-3px);
            background-color: #5a6e56;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Tony Photography" class="logo">
        <div class="tagline">Cinematic. Gritty. Powerful.</div>
    </header>

    <div class="container">
        <h2>Reserve Your Session</h2>
        <p>Book a cinematic shoot with Tony. Select a date and time that works for you below.</p>
        
        <a href="https://calendly.com/your-profile" class="booking-btn">View Availability</a>
    </div>

    <footer>
        &copy; 2026 Tony Photography. All rights reserved.
    </footer>

</body>
</html>
