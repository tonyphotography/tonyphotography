<style>
    :root {
        --base-sage: #6b8266; 
        --dark-sage: #2d3829;
        --glow-green: #a8ff78;
        --accent-gold: #c5a059;
        --pure-white: #ffffff;
        --glass-bg: rgba(20, 25, 18, 0.9);
    }

    * { box-sizing: border-box; } /* Crucial for mobile sizing */

    body, html {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at 50% 50%, #4a5a47 0%, #2d3829 100%);
        color: var(--pure-white);
        font-family: 'Montserrat', sans-serif;
        scroll-behavior: smooth;
        overflow-x: hidden;
    }

    /* HEADER & NAVIGATION */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        z-index: 1000;
        background: rgba(0,0,0,0.2);
        backdrop-filter: blur(10px);
    }

    .header-logo img { max-height: 45px; }

    nav { display: none; } /* Hidden on mobile by default */

    @media (min-width: 1024px) {
        nav {
            display: flex;
            gap: 25px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 35px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-logo img { max-height: 60px; }
    }

    .nav-book-btn {
        background-color: var(--pure-white);
        color: var(--dark-sage);
        padding: 12px 25px;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 900;
        font-size: 0.8rem;
        text-transform: uppercase;
    }

    /* HERO SECTION */
    .hero {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 100px 20px 60px;
    }

    .hero-container {
        background: var(--glass-bg);
        border: 1px solid rgba(168, 255, 120, 0.2);
        backdrop-filter: blur(25px);
        width: 100%;
        max-width: 1150px;
        padding: 60px 25px;
        border-radius: 30px;
        text-align: center;
    }

    .hero h1 {
        font-size: clamp(2.2rem, 8vw, 5rem);
        font-weight: 900;
        line-height: 1.1;
        color: var(--glow-green); 
    }

    .brand-text {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 0.6em;
        display: block;
        color: #fff;
    }

    /* GRIDS */
    .grid-container, .cov-grid {
        display: grid;
        grid-template-columns: 1fr; /* Stacked on mobile */
        gap: 20px;
        padding: 20px;
    }

    @media (min-width: 768px) {
        .grid-container, .cov-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (min-width: 1100px) {
        .grid-container, .cov-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    .glass-card, .cov-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 25px;
        padding: 30px;
        height: 100%;
    }

    /* PILLS */
    .pill, .tag-pill {
        display: inline-block;
        background: rgba(168, 255, 120, 0.1);
        color: var(--glow-green);
        padding: 6px 14px;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 800;
        margin: 4px;
    }

    /* SECTIONS */
    .section-padding { padding: 80px 5%; }

    /* FOUNDER SECTION */
    .founder-container {
        display: flex;
        flex-direction: column;
        padding: 30px;
        border-radius: 30px;
        background: var(--glass-bg);
    }

    .founder-pic {
        width: 100%;
        height: 300px;
        margin-bottom: 30px;
        border-radius: 20px;
    }

    @media (min-width: 900px) {
        .founder-container { flex-direction: row; padding: 60px; }
        .founder-pic { width: 320px; height: 400px; margin-right: 60px; margin-bottom: 0; }
    }

    /* WORK/PORTFOLIO */
    .work-container {
        padding: 40px 20px;
        border-radius: 30px;
    }

    .brand-logo { width: 150px; margin-bottom: 40px; }
</style>
