<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Photography | Cinematic Visuals</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            /* BRAND COLORS */
            --base-sage: #6b8266; 
            --dark-sage: #2d3829;
            --glow-green: #a8ff78; /* Vibrant lime green for the text glow */
            --accent-gold: #c5a059;
            --pure-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            /* GLOWING BACKGROUND EFFECT */
            background: radial-gradient(circle at 50% 50%, #4a5a47 0%, #2d3829 100%);
            color: var(--pure-white);
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
            height: 100vh;
            overflow: hidden;
        }

        /* Ambient glowing spots in the background */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(168, 255, 120, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(168, 255, 120, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        /* HEADER - ENLARGED */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%; /* Increased padding */
            position: fixed;
            top: 0;
            width: 90%;
            z-index: 1000;
        }

        .header-logo img {
            max-height: 70px; /* Bigger logo */
            display: block;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        nav {
            display: flex;
            gap: 35px; /* More space between links */
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 45px; /* Larger nav bar */
            border-radius: 60px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 1rem; /* Bigger text */
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--glow-green);
            text-shadow: 0 0 10px var(--glow-green);
        }

        .nav-book-btn {
            background-color: var(--pure-white);
            color: var(--dark-sage);
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .nav-book-btn:hover {
            background-color: var(--glow-green);
            box-shadow: 0 0 30px var(--glow-green);
            transform: scale(1.05);
        }

        /* HERO CONTAINER */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60px;
        }

        .hero-container {
            background: rgba(20, 25, 18, 0.7); /* Darker frost for depth */
            border: 1px solid rgba(168, 255, 120, 0.2);
            backdrop-filter: blur(25px);
            width: 90%;
            max-width: 1000px;
            padding: 90px 50px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
        }

        .top-badge {
            color: var(--accent-gold);
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 25px;
            display: block;
        }

        /* GLOWING GREEN MAIN TEXT */
        .hero h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1.0;
            color: var(--glow-green);
            /* THE GLOW EFFECT */
            text-shadow: 0 0 20px rgba(168, 255, 120, 0.6), 
                         0 0 40px rgba(168, 255, 120, 0.3);
        }

        .brand-text {
            color: var(--pure-white);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-transform: none;
            display: block;
            margin-top: 15px;
            font-size: 0.8em;
            text-shadow: none; /* Keeps "Cinematic Dreams" clean white */
        }

        .hero-sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin: 40px auto;
            max-width: 700px;
            line-height: 1.8;
        }

        /* BUTTONS */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .cta-main {
            background-color: var(--pure-white);
            color: var(--dark-sage);
            padding: 20px 45px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            box-shadow: 0 0 20px var(--glow-green);
            transition: 0.3s;
        }

        .cta-main:hover {
            background-color: var(--glow-green);
            transform: scale(1.05);
        }

        .cta-outline {
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 20px 45px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .cta-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: white;
        }

    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <img src="logo.png" alt="Tony Photography">
        </div>
        
        <nav>
            <a href="#">Home</a>
            <a href="#">Why Us</a>
            <a href="#">Packages</a>
            <a href="#">Samples</a>
            <a href="#">Contact</a>
        </nav>
        
        <a href="https://wa.me/919989920100" class="nav-book-btn">Book Now</a>
    </header>

    <main class="hero">
        <div class="hero-container">
            <span class="top-badge">★ India's Premium Cinematic Shoots</span>
            
            <h1>
                YOUR VISION, <br> OUR LENS. 
                <span class="brand-text">Cinematic Dreams.</span>
            </h1>
            
            <p class="hero-sub">
                Specializing in high-contrast digital illustrations and photography, 
                defining grit and dynamic lighting for weddings and commercial events.
            </p>
            
            <div class="btn-group">
                <a href="https://wa.me/919989920100" class="cta-main">Book Your Shoot</a>
                <a href="#" class="cta-outline">View Samples</a>
            </div>
        </div>
    </main>

</body>
</html>
