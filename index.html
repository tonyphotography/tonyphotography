<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Photography | Bookings</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage-green: #6b8266; 
            --whatsapp-green: #25D366;
            --off-white: #f8f9f7;
            --dark-text: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', serif;
            background-color: var(--sage-green);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 30px 20px;
            text-align: center;
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 15px;
        }

        .tagline {
            font-style: italic;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .container {
            background: white;
            color: var(--dark-text);
            width: 85%;
            max-width: 600px;
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            margin-top: 20px;
        }

        h2 {
            font-size: 2.2rem;
            margin-top: 0;
            color: var(--sage-green);
        }

        p {
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .booking-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--whatsapp-green);
            color: white;
            padding: 18px 35px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .booking-btn:hover {
            transform: scale(1.05);
            background-color: #1ebe57;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Tony Photography" class="logo">
        <div class="tagline">Cinematic Digital Illustrations</div>
    </header>

    <div class="container">
        <h2>Book Your Session</h2>
        <p>Ready to capture your cinematic story? Click the button below to message me on WhatsApp and check my current availability.</p>
        
        <a href="https://wa.me/919989920100?text=Hi%20Tony!%20I'd%20like%20to%20enquire%20about%20booking%20a%20photoshoot." class="booking-btn">
            Book Now via WhatsApp
        </a>
    </div>

    <footer>
        &copy; 2026 TONY PHOTOGRAPHY | ALL RIGHTS RESERVED
    </footer>

</body>
</html>
