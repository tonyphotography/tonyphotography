<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Photography | Cinematic Visuals</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            /* YOUR BRAND COLORS */
            --main-sage: #6b8266; 
            --dark-sage: #4a5a47; /* Darker version for the glass box */
            --accent-gold: #c5a059;
            --pure-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--main-sage);
            color: var(--pure-white);
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
            height: 100%;
        }

        /* 1. HEADER - SINGLE LOGO & NAV */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            top: 0;
            width: 90%;
            z-index: 1000;
        }

        .header-logo img {
            max-height: 50px; /* Adjusted for single logo visibility */
            display: block;
        }

        nav {
            display: flex;
            gap: 25px;
            background: rgba(0, 0, 0, 0.1);
            padding: 12px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .nav-book-btn {
            background-color: var(--pure-white);
            color: var(--main-sage);
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-book-btn:hover {
            background-color: var(--accent-gold);
            color: white;
        }

        /* 2. HERO SECTION - GLASSMORPHISM */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 5%;
        }

        .hero-container {
            background: rgba(45, 56, 41, 0.6); /* Translucent dark sage */
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 900px;
            padding: 80px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .top-badge {
            color: var(--accent-gold);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1.1;
        }

        /* REMOVED PURPLE: Now uses your logo's white-serif style */
        .brand-text {
            color: var(--pure-white);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            text-transform: capitalize;
            display: block;
            margin-top: 10px;
        }

        .hero-sub {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin: 30px auto;
            max-width: 600px;
            line-height: 1.6;
        }

        /* 3. BUTTONS */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .cta-main {
            background-color: var(--pure-white);
            color: var(--main-sage);
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .cta-main:hover {
            background-color: var(--accent-gold);
            color: white;
            transform: translateY(-3px);
        }

        .cta-outline {
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .cta-outline:hover {
            background: rgba(255,255,255,0.1);
        }

    </style>
</head>
<body>

    <header>
        <div class="header-logo">
            <img src="logo.png" alt="Tony Photography">
        </div>
        
        <nav>
            <a href="#">Home</a>
            <a href="#">Why Us</a>
            <a href="#">Packages</a>
            <a href="#">Samples</a>
            <a href="#">Contact</a>
        </nav>
        
        <a href="https://wa.me/919989920100" class="nav-book-btn">Book Now</a>
    </header>

    <main class="hero">
        <div class="hero-container">
            <span class="top-badge">★ India's Premium Cinematic Shoots</span>
            
            <h1>
                Your Vision, <br> Our Lens. 
                <span class="brand-text">Cinematic Dreams.</span>
            </h1>
            
            <p class="hero-sub">
                Specializing in high-contrast digital illustrations and photography, 
                defining grit and dynamic lighting for weddings and commercial events.
            </p>
            
            <div class="btn-group">
                <a href="https://wa.me/919989920100" class="cta-main">Book Your Shoot</a>
                <a href="#" class="cta-outline">View Samples</a>
            </div>
        </div>
    </main>

</body>
</html>
