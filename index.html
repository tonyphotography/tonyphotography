<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineReelz | Cinematic Shoots</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --dark: #1b2419;
    --green: #a8ff78;
    --white: #ffffff;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--dark);
    color: var(--white);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.logo {
    font-weight: 900;
    font-size: 1.2rem;
}

.menu-toggle {
    font-size: 1.5rem;
    cursor: pointer;
    display: none;
}

nav {
    display: flex;
    gap: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
}

.btn {
    background: var(--green);
    padding: 10px 20px;
    border-radius: 30px;
    color: black;
    font-weight: bold;
    text-decoration: none;
}

/* HERO */
.hero {
    padding: 120px 20px 60px;
    text-align: center;
}

.hero h1 {
    font-size: clamp(2rem, 8vw, 4rem);
}

.hero p {
    font-size: 0.9rem;
    opacity: 0.8;
}

.hero .btn {
    display: inline-block;
    margin-top: 20px;
}

/* GRID */
.grid {
    display: grid;
    gap: 20px;
    padding: 40px 5%;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 20px;
}

/* MOBILE */
@media(max-width:768px) {
    nav {
        display: none;
        flex-direction: column;
        position: absolute;
        right: 5%;
        top: 70px;
        background: #000;
        padding: 15px;
        border-radius: 10px;
    }

    nav.active {
        display: flex;
    }

    .menu-toggle {
        display: block;
    }
}

/* DESKTOP */
@media(min-width:769px) {
    .grid {
        grid-template-columns: repeat(3,1fr);
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">CineReelz</div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="menu">
        <a href="#">Home</a>
        <a href="#">Work</a>
        <a href="#">Contact</a>
    </nav>
    <a href="#" class="btn">Book</a>
</header>

<section class="hero">
    <h1>Your Vision, Our Lens</h1>
    <p>Cinematic photography & reels with premium storytelling</p>
    <a href="#" class="btn">Book Now</a>
</section>

<section class="grid">
    <div class="card">Cinematic Shoots</div>
    <div class="card">Weddings</div>
    <div class="card">Events</div>
</section>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
